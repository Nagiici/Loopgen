name: Publish

on:
  push:
    tags: ['v*']

# Publishes to npm on a version tag (e.g. `git tag v0.2.1 && git push --tags`).
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed. The package's
# Trusted Publisher must be configured on npmjs.com (GitHub Actions: Nagiici/Loopgen, publish.yml).
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest # Trusted Publishing requires npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - name: Skip if this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is already published; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.exists == 'false'
        run: npm publish --provenance --access public
