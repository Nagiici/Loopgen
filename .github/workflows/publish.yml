name: Publish

on:
  push:
    tags: ['v*']

# Publishes to npm on a version tag (e.g. `git tag v0.1.1 && git push --tags`).
# Requires an `NPM_TOKEN` repository secret (npm automation token).
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Skip if this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is already published; skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.exists == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
